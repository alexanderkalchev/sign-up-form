<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="banner">
        <div class="logo">
          <img src="./images/logo.png" alt="logo" />
          <h1>ODIN</h1>
        </div>
        <p class="credit">
          Photo by <span class="underline">Andrey K</span> on
          <span class="underline">Unsplash</span>
        </p>
      </div>
      <div class="form-section">
        <div class="quote left-margin">
          <h2>
            This is not a real online service! You know you need something like
            this in your life to help you reailze your deepest dreams.
            <br />Sign up
            <span class="italic">now</span>
            to get started.
          </h2>
          <h2>You <span class="italic">know</span> you want to.</h2>
        </div>
        <div class="form-container">
          <h2 class="left-margin">Let's do this!</h2>
          <form action="#" method="post" id="submit-form">
            <div class="left-side left-margin">
              <div class="first-name">
                <label for="first-name">FIRST NAME</label>
                <input type="text" id="first-name" name="first-name" required />
                <span></span>
              </div>
              <div class="email">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="password">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" required />
              </div>
            </div>
            <div class="right-side left-margin">
              <div class="last-name">
                <label for="last-name">LAST NAME</label>
                <input type="text" id="last-name" name="last-name" required />
              </div>
              <div class="phone-number">
                <label for="phone-number">PHONE NUMBER</label>
                <input
                  type="tel"
                  id="phone-number"
                  name="phone-number"
                  required
                />
              </div>
              <div class="confirm-password">
                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  id="confirm-password"
                  name="confirm-password"
                  required
                />
              </div>
            </div>
          </form>
        </div>
        <button class="left-margin" form="submit-form">Create Account</button>
        <p class="left-margin">
          Already have an account? <a href="#">Log in</a>
        </p>
      </div>
    </div>
  </body>
</html>
